<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Sheroo | AI Assistant</title>
    
    <link rel="manifest" href="sheroo-manifest.json">
    <link rel="apple-touch-icon" href="logo.png.PNG">
    <link rel="icon" type="image/png" href="logo.png.PNG">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root {
            --bg-dark: #080808;
            --bg-card: rgba(18, 18, 22, 0.95);
            --bg-glass: rgba(255, 255, 255, 0.04);
            --border-glass: rgba(255, 255, 255, 0.08);
            --primary-color: #ff4d4d;
            --primary-gradient: linear-gradient(135deg, #ff4d4d, #ff1a1a);
            --text-grey: #888;
            --success: #4dff8c;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100dvh;
            background-color: var(--bg-dark); overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif; position: fixed; touch-action: none; color: #fff;
        }

        .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 1; }
        .orb-1 { width: 300px; height: 300px; background: rgba(255,77,77,0.12); top: -100px; left: -80px; animation: orbFloat 8s ease-in-out infinite; }
        .orb-2 { width: 250px; height: 250px; background: rgba(255, 140, 64, 0.08); bottom: -50px; right: -50px; animation: orbFloat 10s ease-in-out infinite 2s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }

        #login-section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 5000; padding: 20px; background: var(--bg-dark);
        }

        .login-card {
            background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 32px;
            padding: 40px 25px; width: 100%; max-width: 380px; text-align: center;
            position: relative; z-index: 10; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        @keyframes cardIn { from { transform: translateY(40px) scale(0.95); opacity: 0; } to { transform: none; opacity: 1; } }

        .login-logo-container {
            width: 80px; height: 80px; margin: 0 auto 20px;
            background: var(--bg-glass); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-glass); box-shadow: 0 0 20px rgba(255,77,77,0.2);
            animation: logoPulse 2s ease-in-out infinite;
        }
        .login-logo-container img { width: 55px; height: auto; border-radius: 10px; }
        @keyframes logoPulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.05); } }

        .login-logo-text { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 5px; }
        .login-logo-text span { color: var(--primary-color); }
        .login-subtitle { color: var(--text-grey); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; font-weight: 600; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.7rem; font-weight: 700; color: var(--text-grey); text-transform: uppercase; letter-spacing: 1px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--primary-color); opacity: 0.7; }
        .input-wrapper input {
            width: 100%; background: var(--bg-glass); border: 1px solid var(--border-glass);
            padding: 14px 14px 14px 44px; border-radius: 14px; color: #fff;
            font-family: inherit; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .input-wrapper input:focus { border-color: var(--primary-color); background: rgba(255,255,255,0.08); }

        .login-btn {
            width: 100%; padding: 15px; background: var(--primary-gradient); border: none;
            border-radius: 14px; color: #fff; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .login-btn:active { transform: scale(0.97); }

        .divider { display: flex; align-items: center; text-align: center; color: #444; font-size: 0.65rem; font-weight: 700; margin: 25px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-glass); }
        .divider span { padding: 0 12px; }

        .bio-btn {
            width: 55px; height: 55px; border-radius: 50%; background: var(--bg-glass); border: 1px solid var(--border-glass);
            color: var(--primary-color); font-size: 1.4rem; display: flex; justify-content: center; align-items: center;
            margin: 0 auto 10px; cursor: pointer; transition: 0.3s;
        }
        .bio-btn:active { transform: scale(0.9); }
        .bio-btn-text { color: var(--text-grey); font-size: 0.7rem; font-weight: 700; display: block; text-align: center; }

        .error-msg { color: #ff4d4d; font-size: 0.8rem; margin-top: 15px; display: none; font-weight: 600; text-align: center; }

        /* ===== APP UI ===== */
        #main-app { display: none; height: 100%; position: relative; }
        .app-header {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(65px + var(--safe-top));
            padding: var(--safe-top) 20px 0; display: flex; justify-content: space-between; align-items: center;
            z-index: 100; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 77, 77, 0.15); box-sizing: border-box;
        }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); box-shadow: 0 0 10px var(--success); animation: blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .logo-text { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.2rem; color: #fff; }
        .logo-text span { color: var(--primary-color); }
        .header-actions { display: flex; gap: 8px; }
        .header-btn {
            width: 38px; height: 38px; border-radius: 11px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass);
            color: #ccc; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }

        #botWidgetArea { width: 100%; height: 100%; padding-top: calc(65px + var(--safe-top)); box-sizing: border-box; }

        #ready-overlay {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .ready-loader { width: 40px; height: 40px; border: 3px solid rgba(255,77,77,0.1); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <section id="login-section">
        <div class="login-card">
            <div class="login-logo-container"><img src="logo.png.PNG"></div>
            <div class="login-logo-text"><span>69</span>STUDIO</div>
            <div class="login-subtitle">Sheroo Assistant App</div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Access Key</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="pwInput" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="login-btn">Access Sheroo AI <i class="fas fa-arrow-right"></i></button>
                <div id="errorMsg" class="error-msg">Incorrect Access Key.</div>
            </form>

            <div id="bio-container" style="display:none;">
                <div class="divider"><span>OR QUICK ACCESS</span></div>
                <button type="button" class="bio-btn" id="bioBtn"><i class="fas fa-fingerprint"></i></button>
                <span class="bio-btn-text">Touch ID / Face ID</span>
            </div>
        </div>
    </section>

    <main id="main-app">
        <header class="app-header">
            <div class="header-brand"><div class="status-dot"></div><div class="logo-text"><span>69</span>Sheroo</div></div>
            <div class="header-actions">
                <button class="header-btn" id="setupBioBtn" title="Setup Biometric"><i class="fas fa-fingerprint"></i></button>
                <button class="header-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
                <button class="header-btn" id="logoutBtn"><i class="fas fa-power-off"></i></button>
            </div>
        </header>
        <div id="botWidgetArea"></div>
    </main>

    <div id="ready-overlay"><div class="ready-loader"></div></div>

    <script>
        const SECRET = "69studio77";
        
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const pwInput = document.getElementById('pwInput');
        const loginSection = document.getElementById('login-section');
        const mainApp = document.getElementById('main-app');
        const readyOverlay = document.getElementById('ready-overlay');
        const errorMsg = document.getElementById('errorMsg');
        
        // PWA
        if ('serviceWorker' in navigator && location.protocol !== 'file:') {
            navigator.serviceWorker.register('./sheroo-sw.js').catch(() => {});
        }

        // Initialize
        function initApp() {
            console.log("Sheroo: Initializing...");
            
            // Safety timeout to transition from loader to app or login
            setTimeout(() => {
                const isAuth = localStorage.getItem('sheroo_v1_auth') === 'true';
                console.log("Sheroo: Auth Status:", isAuth);

                if (isAuth) {
                    showApp();
                } else {
                    if (readyOverlay) readyOverlay.style.display = 'none';
                    if (loginSection) {
                        loginSection.style.display = 'flex';
                        loginSection.style.opacity = '1';
                        loginSection.style.visibility = 'visible';
                    }
                    
                    // Show bio login button only if enrolled
                    if (localStorage.getItem('auth_id')) {
                        document.getElementById('bio-container').style.display = 'block';
                    }

                    if (pwInput) {
                        setTimeout(() => pwInput.focus(), 100);
                    }
                }
            }, 800);
        }

        // Run init when DOM is ready
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }

        // Emergency fallback - hide loader after 5s no matter what
        setTimeout(() => {
            if (readyOverlay && readyOverlay.style.display !== 'none') {
                 console.log("Emergency loader hide");
                 readyOverlay.style.display = 'none';
                 if (localStorage.getItem('sheroo_v1_auth') !== 'true') {
                     loginSection.style.display = 'flex';
                 }
            }
        }, 5000);

        // Login Handler
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            console.log("Attempting login...");
            if (pwInput.value.trim() === SECRET) {
                localStorage.setItem('sheroo_v1_auth', 'true');
                showApp();
            } else {
                errorMsg.style.display = 'block';
                pwInput.value = '';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 2000);
            }
        });

        function showApp() {
            loginSection.style.display = 'none';
            readyOverlay.style.display = 'none';
            mainApp.style.display = 'block';
            loadBot();
        }

        function loadBot() {
            if (window.voiceflow) return;
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs";
            script.onload = () => {
                window.voiceflow.chat.load({
                    verify: { projectID: '69d38db2d46abb5cf5651387' },
                    url: 'https://general-runtime.voiceflow.com',
                    versionID: 'production',
                    voice: { url: "https://runtime-api.voiceflow.com" },
                    autostart: true,
                    render: { mode: 'embedded', target: document.getElementById('botWidgetArea') }
                });
            };
            document.body.appendChild(script);
        }

        // Action Buttons
        document.getElementById('refreshBtn').addEventListener('click', () => location.reload());
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if(confirm("Logout?")) {
                localStorage.removeItem('sheroo_v1_auth');
                location.reload();
            }
        });
        document.getElementById('bioBtn').addEventListener('click', bioAuth);
        document.getElementById('setupBioBtn').addEventListener('click', setupBiometric);

        async function setupBiometric() {
            if (!window.PublicKeyCredential) {
                alert("Biometric device not detected on this browser.");
                return;
            }
            try {
                const challengeArr = new Uint8Array(32);
                window.crypto.getRandomValues(challengeArr);
                const publicKey = {
                    challenge: challengeArr,
                    rp: { name: "Sheroo AI" },
                    user: {
                        id: Uint8Array.from("SHEROOUSERID", c => c.charCodeAt(0)),
                        name: "admin@sheroo.com",
                        displayName: "Sheroo Admin"
                    },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                    timeout: 60000,
                    attestation: "direct",
                    authenticatorSelection: { authenticatorAttachment: "platform" }
                };
                const credential = await navigator.credentials.create({ publicKey });
                if (credential) {
                    localStorage.setItem('auth_id', btoa(String.fromCharCode(...new Uint8Array(credential.rawId))));
                    alert("Fingerprint / Face ID setup complete!");
                }
            } catch (err) {
                alert("Setup failed: " + err.message);
            }
        }

        async function bioAuth() {
            if (location.protocol === 'file:') {
                alert("Security: Fingerprint only works on live websites (HTTPS). Use your Password.");
                return;
            }
            try {
                const challengeArr = new Uint8Array(32);
                window.crypto.getRandomValues(challengeArr);
                const options = {
                    challenge: challengeArr,
                    allowCredentials: [{ 
                        id: Uint8Array.from(atob(localStorage.getItem('auth_id') || ""), c => c.charCodeAt(0)), 
                        type: 'public-key' 
                    }],
                    timeout: 60000,
                    userVerification: "required"
                };
                const assertion = await navigator.credentials.get({ publicKey: options });
                if (assertion) {
                    localStorage.setItem('sheroo_v1_auth', 'true');
                    showApp();
                }
            } catch (err) {
                alert("Setup failed or not supported. Use Password.");
            }
        }
    </script>
</body>
</html>
